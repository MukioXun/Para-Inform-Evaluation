<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频标注平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-card h3 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 5px;
        }
        .stat-card p {
            color: #666;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .category-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.15);
        }
        .category-card h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        .category-card .count {
            font-size: 2.5em;
            color: #667eea;
            font-weight: bold;
        }
        .category-card .label {
            color: #666;
            margin-top: 5px;
        }
        .progress-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎧 音频标注平台</h1>
            <p>人工验证音频属性识别结果</p>
        </div>

        <div class="stats-grid" id="stats">
            <!-- 动态加载统计 -->
        </div>

        <div class="categories-grid">
            {% for category in categories %}
            <a href="/category/{{ category }}" class="category-card">
                <h2>{{ category | upper }}</h2>
                <div class="count" id="count-{{ category }}">-</div>
                <div class="label">待标注</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-{{ category }}" style="width: 0%"></div>
                </div>
            </a>
            {% endfor %}
        </div>
    </div>

    <script>
        // 加载统计信息
        fetch('/api/stats')
            .then(res => res.json())
            .then(data => {
                let totalAll = 0;
                let annotatedAll = 0;

                for (const [category, stats] of Object.entries(data)) {
                    const countEl = document.getElementById(`count-${category}`);
                    const progressEl = document.getElementById(`progress-${category}`);

                    if (countEl) {
                        countEl.textContent = stats.remaining;
                    }
                    if (progressEl) {
                        const percent = stats.total > 0 ? (stats.annotated / stats.total * 100) : 0;
                        progressEl.style.width = `${percent}%`;
                    }

                    totalAll += stats.total;
                    annotatedAll += stats.annotated;
                }

                // 更新总统计
                document.getElementById('stats').innerHTML = `
                    <div class="stat-card">
                        <h3>${totalAll}</h3>
                        <p>总数据量</p>
                    </div>
                    <div class="stat-card">
                        <h3>${annotatedAll}</h3>
                        <p>已标注</p>
                    </div>
                    <div class="stat-card">
                        <h3>${totalAll - annotatedAll}</h3>
                        <p>待标注</p>
                    </div>
                `;
            });
    </script>
</body>
</html>
